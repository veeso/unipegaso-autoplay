name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: sign · publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./src/manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: web-ext lint
        run: npx web-ext lint --source-dir=dist --self-hosted

      - name: Create source archive
        run: |
          zip -r source.zip . \
            -x "node_modules/*" \
               "dist/*" \
               "web-ext-artifacts/*" \
               ".git/*" \
               ".github/*" \
               ".claude/*" \
               "*.DS_Store"

      - name: Sign (AMO unlisted channel)
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir=dist \
            --artifacts-dir=web-ext-artifacts \
            --channel=unlisted \
            --upload-source-code=source.zip

      - name: Locate signed XPI
        id: xpi
        run: |
          XPI=$(find web-ext-artifacts -name '*.xpi' | head -n1)
          if [ -z "$XPI" ]; then
            echo "No signed XPI produced"
            exit 1
          fi
          echo "path=$XPI" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.xpi.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
